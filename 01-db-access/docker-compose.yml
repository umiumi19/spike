services:
  db:
    image: postgres:16
    container_name: dbcompare-pg
    environment:
      POSTGRES_USER: blog
      POSTGRES_PASSWORD: blog
      POSTGRES_DB: blog
    ports:
      - "5432:5432"
    volumes:
      - ./01-create-databases.sql:/docker-entrypoint-initdb.d/01-create-databases.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U blog"]
      interval: 2s
      timeout: 2s
      retries: 15
